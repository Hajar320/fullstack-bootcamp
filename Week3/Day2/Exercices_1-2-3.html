// exercice 1

function displayNumbersDivisible() {
    let sum = 0;
    let outcome = "";

    for (let i = 0; i < 500; i += 1) {
        if (i%23 === 0){
        outcome += i + " ";
        sum += i;
        }
    }
    console.log("Outcome:", outcome.trim());
    console.log("Sum:", sum);
}

displayNumbersDivisible()

// Exercise 2 : Shopping List
const stock = { 
    "banana": 6, 
    "apple": 0,
    "pear": 12,
    "orange": 32,
    "blueberry":1
}  
const prices = {    
    "banana": 4, 
    "apple": 2, 
    "pear": 1,
    "orange": 1.5,
    "blueberry":10
} 
shoppingList =["banana","orange","apple"]

function myBill(){
   let totalPrice = 0
    for(let i=0 ; i< shoppingList.length ; i++){

        if( shoppingList[i] in stock && stock[shoppingList[i]] > 0 ){
                 totalPrice +=prices[shoppingList[i]]
                 stock[shoppingList[i]]-=1;
            }
    }
        console.log(totalPrice)
}
myBill()

// Exercise 3 : What’s in my wallet ?

function  changeEnough(itemPrice, amountOfChange){
    let sumChange = 0;
    const coinValues = [0.25, 0.10, 0.05, 0.01]

        for (let i=0 ; i < amountOfChange.length ; i++){
            sumChange += amountOfChange[i] * coinValues[i];
        }
        if (sumChange >= itemPrice){
            return true
        }
        else {
            return false
        }       
}

console.log(changeEnough(14.11, [2,100,0,0]))
console.log(changeEnough(0.75, [0,0,20,5]))
