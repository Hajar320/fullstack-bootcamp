<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyBot AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif; 
      background: linear-gradient(135deg, #EAF6FF, #F9FBFC); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
    }
    .chat-container { 
      background: #fff; 
      border-radius: 16px; 
      box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
      max-width: 600px; 
      width: 100%; 
      overflow: hidden; 
    }
    .chat-header { 
      background: linear-gradient(135deg, #B2EBF2, #81D4FA); 
      color: white; 
      padding: 20px; 
      text-align: center; 
    }
    .chat-messages { 
      height: 400px; 
      padding: 20px; 
      overflow-y: auto; 
      background: #fdfefe; 
    }
    .message { 
      margin: 12px 0; 
      padding: 12px 16px; 
      border-radius: 12px; 
      max-width: 80%; 
      line-height: 1.5; 
    }
    .user-message { 
      background: #E3F2FD; 
      margin-left: auto; 
      color: #0D47A1; 
    }
    .bot-message { 
      background: #F1F8FF; 
      border: 1px solid #E1F5FE; 
    }
    .chat-input-container { 
      padding: 16px 20px; 
      background: #fafbfd; 
      border-top: 1px solid #e0f7fa; 
    }
    .input-group { 
      display: flex; 
      gap: 10px; 
    }
    #user-input { 
      flex: 1; 
      padding: 12px; 
      border: 1px solid #cfd8dc; 
      border-radius: 8px; 
      font-size: 16px; 
    }
    #user-input:focus { 
      border-color: #81D4FA; 
      outline: none; 
    }
    button { 
      padding: 12px 20px; 
      background: #4FC3F7; 
      border: none; 
      color: white; 
      border-radius: 8px; 
      cursor: pointer; 
    }
    button:hover { background: #29B6F6; }
    button:disabled { background: #B0BEC5; cursor: not-allowed; }
    .typing { font-style: italic; color: #78909C; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>☁️ SkyBot AI</h1>
      <p>Your assistant in the clouds</p>
    </div>
    
    <div class="chat-messages" id="chat-messages">
      <div class="message bot-message">Hello! How can I help you today?</div>
    </div>
    
    <div class="chat-input-container">
      <div class="input-group">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
        <button onclick="sendMessage()" id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat-messages');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    function addMessage(text, isUser = false) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      input.disabled = btn.disabled = true;
      addMessage(message, true);
      input.value = '';

      const typing = document.createElement('div');
      typing.className = 'message bot-message typing';
      typing.id = 'typing';
      typing.textContent = 'SkyBot is typing...';
      chat.appendChild(typing);

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await response.json();
        document.getElementById('typing').remove();
        addMessage(data.response || 'Error');
      } catch {
        document.getElementById('typing').remove();
        addMessage('Connection error');
      } finally {
        input.disabled = btn.disabled = false;
        input.focus();
      }
    }

    input.addEventListener('keypress', e => e.key === 'Enter' && sendMessage());
    input.focus();
  </script>
</body>
</html>
